<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail — VetriFresh</title>
  <link rel="stylesheet" th:href="@{/css/home.css}"/>
  <link rel="stylesheet" th:href="@{/css/cart.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="cart-page">

  <!-- Back link -->
  <a th:href="@{/orders}" style="display:inline-flex;align-items:center;gap:6px;
     color:#2d6a4f;font-weight:600;font-size:14px;margin-bottom:20px;text-decoration:none;">
    ← Back to My Orders
  </a>

  <h2 class="cart-page-title"
      th:text="'Order #' + ${order.orderNumber}">Order Detail</h2>

  <!-- Status + Date -->
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:24px;">
    <span th:text="${order.status}"
          th:class="${order.status.name() == 'DELIVERED' ? 'badge-yes' : order.status.name() == 'CANCELLED' ? 'badge-no' : 'badge-pending'}">
      PENDING
    </span>
    <span style="color:#888;font-size:13px;"
          th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy, hh:mm a')}">—</span>
  </div>

  <!-- Order Items -->
  <div class="cart-card" style="margin-bottom:20px;">
    <h4 style="color:#1b4332;margin-bottom:16px;font-size:15px;">Items Ordered</h4>

    <div th:each="item : ${order.orderItems}"
         style="display:flex;justify-content:space-between;align-items:center;
                padding:10px 0;border-bottom:1px solid #f5f5f5;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:48px;height:48px;background:#f1f8f1;border-radius:10px;
                    display:flex;align-items:center;justify-content:center;font-size:22px;">
          🥬
        </div>
        <div>
          <div style="font-weight:600;font-size:14px;" th:text="${item.product.name}">—</div>
          <div style="color:#888;font-size:12px;"
               th:text="'₹' + ${item.unitPrice} + ' × ' + ${item.quantity}">—</div>
        </div>
      </div>
      <strong style="color:#1b4332;" th:text="'₹' + ${item.totalPrice}">—</strong>
    </div>

    <!-- Totals -->
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid #f0f0f0;">
      <div style="display:flex;justify-content:space-between;font-size:14px;
                  color:#888;margin-bottom:6px;">
        <span>Delivery Charge</span>
        <span th:text="${order.deliveryCharge.compareTo(T(java.math.BigDecimal).ZERO) == 0 ? 'FREE' : '₹' + order.deliveryCharge}">—</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;
                  color:#1b4332;margin-top:8px;">
        <span>Total</span>
        <span th:text="'₹' + ${order.totalAmount}">—</span>
      </div>
    </div>
  </div>

  <!-- Shipping Address -->
  <div class="cart-card" style="margin-bottom:20px;">
    <h4 style="color:#1b4332;margin-bottom:12px;font-size:15px;">Delivery Address</h4>
    <p style="font-size:14px;color:#555;line-height:1.7;margin:0;">
      <strong th:text="${order.shippingName}">—</strong><br/>
      <span th:text="${order.shippingAddress}">—</span><br/>
      <span th:text="${order.shippingCity} + ' - ' + ${order.shippingPincode}">—</span><br/>
      <span th:text="${order.shippingPhone}">—</span>
    </p>
  </div>

  <!-- Payment Info -->
  <div class="cart-card">
    <h4 style="color:#1b4332;margin-bottom:12px;font-size:15px;">Payment</h4>
    <div style="display:flex;justify-content:space-between;font-size:14px;">
      <span style="color:#888;">Method</span>
      <span th:text="${order.paymentMethod}">—</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:14px;margin-top:8px;">
      <span style="color:#888;">Status</span>
      <span th:text="${order.paymentStatus}"
            th:class="${order.paymentStatus.name() == 'PAID' ? 'badge-yes' : order.paymentStatus.name() == 'FAILED' ? 'badge-no' : 'badge-pending'}">—</span>
    </div>
  </div>

</div>

<style>
.badge-yes     { background:#d8f3dc; color:#2d6a4f; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-no      { background:#ffe0e0; color:#c0392b; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-pending { background:#fff3cd; color:#856404; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
</style>

</body>
</html>
