<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Category Form</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="admin-layout">

  <aside class="admin-sidebar">
    <div class="admin-logo">🌿 VetriFresh</div>
    <nav>
      <a th:href="@{/admin/dashboard}"><i class="fas fa-home"></i> Dashboard</a>
      <a th:href="@{/admin/products}"><i class="fas fa-box"></i> Products</a>
      <a th:href="@{/admin/categories}" class="active"><i class="fas fa-tags"></i> Categories</a>
      <a th:href="@{/home}"><i class="fas fa-eye"></i> View Site</a>
      <a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title"
          th:text="${category.id != null} ? 'Edit Category' : 'Add Category'">
        Add Category
      </h1>
    </div>

    <div class="admin-card">
      <form th:action="@{/admin/categories/save}"
            th:object="${category}"
            method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="form-grid">

          <div class="form-group">
            <label>Category Name *</label>
            <input type="text" th:field="*{name}"
                   placeholder="e.g. Fresh Vegetables" required/>
          </div>

          <div class="form-group">
            <label>Slug <small>(URL-friendly name)</small></label>
            <input type="text" th:field="*{slug}"
                   placeholder="e.g. fresh-vegetables"/>
          </div>

          <div class="form-group full-width">
            <label>Image URL</label>
            <input type="text" th:field="*{imageUrl}"
                   placeholder="https://... or /images/category.jpg"/>
          </div>

        </div>

        <div class="form-actions">
          <a th:href="@{/admin/categories}" class="btn-cancel">Cancel</a>
          <button type="submit" class="btn-save">
            <i class="fas fa-save"></i>
            <span th:text="${category.id != null} ? 'Update Category' : 'Save Category'">Save</span>
          </button>
        </div>

      </form>
    </div>
  </main>

</div>
</body>
</html>
