<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Vetrifresh</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="admin-layout">
    
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">🌿 VetriFresh</div>
    <nav>
      <a th:href="@{/admin/dashboard}" ><i class="fas fa-home"></i> Dashboard</a>
      <a th:href="@{/admin/products}"><i class="fas fa-box"></i> Products</a>
      <a th:href="@{/admin/categories}"><i class="fas fa-tags"></i> Categories</a>
      <a th:href="@{/admin/orders}"><i class="fas fa-bag-shopping"></i> Orders</a>
      <a th:href="@{/admin/blogs}" class="active"><i class="fas fa-newspaper"></i> Blogs</a>
      <a th:href="@{/home}"><i class="fas fa-eye"></i> View Site</a>
      <a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>
  
  <main class="admin-main">
    <h1 class="admin-page-title"
        th:text="${blog.id != null} ? 'Edit Post' : 'New Blog Post'">New Post</h1>

    <div class="admin-card">
      <form th:action="@{/admin/blogs/save}" method="post"
            th:object="${blog}">
        <input type="hidden" th:field="*{id}"/>

        <div class="form-grid">
          <div class="form-group full-width">
            <label>Title *</label>
            <input type="text" th:field="*{title}" required
                   placeholder="Blog post title..."/>
          </div>

          <div class="form-group">
            <label>Category</label>
            <select th:field="*{category}" title="category">
              <option value="Food">Food</option>
              <option value="Health">Health</option>
              <option value="Organic">Organic</option>
              <option value="Recipes">Recipes</option>
              <option value="Tips">Tips</option>
            </select>
          </div>

          <div class="form-group">
            <label>Author</label>
            <input type="text" th:field="*{author}" placeholder="Admin"/>
          </div>

          <div class="form-group full-width">
            <label>Image URL</label>
            <input type="text" th:field="*{imageUrl}"
                   placeholder="https://... or /images/blog.jpg"/>
          </div>

          <div class="form-group full-width">
            <label>Tags <small>(comma-separated, e.g. Healthy, Organic, Fruit)</small></label>
            <input type="text" th:field="*{tags}" th:object="${blog}"
                  placeholder="Healthy, Organic, Fruit"/>
          </div>

          <div class="form-group full-width">
            <label>Content *</label>
            <textarea th:field="*{content}" rows="10"
                      placeholder="Write your blog content here..."
                      required></textarea>
          </div>

          <div class="form-group full-width">
            <label class="checkbox-label">
              <input type="checkbox" name="isPublished"
                     th:checked="${blog.isPublished == null or blog.isPublished}"/>
              ✅ Publish (visible on site)
            </label>
          </div>
        </div>

        <div class="form-actions">
          <a th:href="@{/admin/blogs}" class="btn-cancel">Cancel</a>
          <button type="submit" class="btn-save">
            <i class="fas fa-save"></i>
            <span th:text="${blog.id != null} ? 'Update Post' : 'Publish Post'">Save</span>
          </button>
        </div>
      </form>
    </div>
  </main>

</div>



</body>
</html>
