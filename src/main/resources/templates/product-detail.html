<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${product.name} + ' — VetriFresh'">Product</title>
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/cart.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-name">Vetri<span>Fresh</span></div>
      <div class="logo-tag">Pure · Organic · Fresh</div>
    </div>
   <div class="header-search">
  <form th:action="@{/search}" method="get" style="display:flex;align-items:center;width:100%">
    <span class="search-icon">🔍</span>
    <input type="text" name="q"
           placeholder="Search fresh vegetables, fruits…"
           th:value="${param.q}"/>
    <button type="submit" style="background:green;border:none;cursor:pointer; padding: 10px 15px; border-radius: 10px; color:white">&#10230;</button>
  </form>
</div>
    <nav>
      <ul>
        <li><a th:href="@{/home}" class="nav-active">Home</a></li>
        <li><a th:href="@{/shop}">Shop</a></li>
        <li><a th:href="@{/blog}">Blog</a></li>
        <li><a th:href="@{/about}">About Us</a></li>
        <li><a th:href="@{/contact}">Contact</a></li>
      </ul>
    </nav>
    <div class="header-actions">
   
      <!-- wishlist -->
      <a th:href="@{/wishlist}" style="text-decoration:none;">
  <button class="icon-btn" title="Wishlist">
    <i class="far fa-heart"></i>
    <span class="cart-badge" id="wishlistCount" th:text="${wishlistCount} ?: '0'">0</span>
  </button>
  </a>
      
      <a th:href="@{/cart}" style="position:relative; text-decoration:none;">
  <button class="icon-btn" title="Cart">
    🛒
    <span class="cart-badge" id="cartCount" th:text="${cartCount} ?: '0'">0</span>
  </button>
</a>

    <span sec:authentication="name">User</span>
    <a th:href="@{/logout}">
        <button class="icon-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
    </a>
</div>

    </a>

<!-- ===== USER MENU ===== -->
<div class="user-menu-wrap">

  <!-- LOGGED IN -->
  <div sec:authorize="isAuthenticated()" class="user-menu">
    <button class="avatar-btn" onclick="toggleUserMenu(event)" title="Account menu">
      <img th:src="${currentUser?.profileImage != null ? currentUser.profileImage : '/images/profiles/default-avatar.jpg'}"
           onerror="this.src='/images/profiles/default-avatar.jpg'"
           class="avatar-img" alt="Profile"/>
      <span class="avatar-online-dot"></span>
    </button>

    <div class="user-dropdown" id="userDropdown">
      <!-- User info header -->
      <div class="dropdown-header">
        <img th:src="${currentUser?.profileImage != null ? currentUser.profileImage : '/images/profiles/default-avatar.jpg'}"
             onerror="this.src='/images/profiles/default-avatar.jpg'"
             class="dropdown-avatar" alt="Profile"/>
        <div class="dropdown-user-info">
          <span class="dropdown-name" sec:authentication="name">User</span>
          <span class="dropdown-role">Member</span>
        </div>
      </div>

      <div class="dropdown-divider"></div>

      <a th:href="@{/profile}" class="dropdown-item">
        <span class="di-icon"><i class="fas fa-user-circle"></i></span>
        <span>My Profile</span>
      </a>
      <a th:href="@{/orders}" class="dropdown-item">
        <span class="di-icon"><i class="fas fa-box-open"></i></span>
        <span>My Orders</span>
      </a>
      <a th:href="@{/wishlist}" class="dropdown-item">
        <span class="di-icon"><i class="fas fa-heart"></i></span>
        <span>Wishlist</span>
      </a>
      <a th:href="@{/cart}" class="dropdown-item">
        <span class="di-icon"><i class="fas fa-shopping-cart"></i></span>
        <span>My Cart</span>
      </a>

      <!-- Admin link — only visible to ADMIN role -->
      <div sec:authorize="hasRole('ADMIN')">
        <div class="dropdown-divider"></div>
        <a th:href="@{/admin/dashboard}" class="dropdown-item dropdown-item-admin">
          <span class="di-icon"><i class="fas fa-shield-alt"></i></span>
          <span>Admin Panel</span>
        </a>

      </div>

      <div class="dropdown-divider"></div>

      <a th:href="@{/logout}" class="dropdown-item dropdown-item-logout">
        <span class="di-icon"><i class="fas fa-sign-out-alt"></i></span>
        <span>Logout</span>
      </a>
    </div>
  </div>

  <!-- NOT LOGGED IN -->
  <div sec:authorize="!isAuthenticated()">
    <a th:href="@{/login}" class="login-pill">
      <i class="fas fa-user"></i>
      <span>Login</span>
    </a>
  </div>

</div>



    </div>
  </div>
</header>

<div class="cart-page">
  <div class="cart-breadcrumb">
    <a th:href="@{/}">Home</a> <span>/</span>
    <a th:href="@{/shop}">Shop</a> <span>/</span>
    <span th:text="${product.name}">Product</span>
  </div>

  <div class="cart-layout">

    <!-- Left: Image -->
    <div class="cart-card" style="display:flex;align-items:center;justify-content:center;min-height:400px;">
      <img th:src="${product.imageUrl} ?: '/images/placeholder.jpg'"
           th:alt="${product.name}"
           style="max-height:350px;max-width:100%;object-fit:contain;border-radius:12px;"/>
    </div>

    <!-- Right: Info -->
    <div class="cart-summary">

      <div th:if="${product.discountPercentage > 0}"
           style="background:#fdecea;color:#e63946;padding:4px 12px;
                  border-radius:20px;font-size:13px;font-weight:700;
                  display:inline-block;margin-bottom:12px;"
           th:text="${product.discountPercentage} + '% OFF'">Sale</div>

      <h1 style="font-size:24px;font-weight:700;color:#1b4332;margin-bottom:8px;"
          th:text="${product.name}">Product Name</h1>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
        <span style="font-size:28px;font-weight:700;color:#2d6a4f;"
              th:text="'₹' + ${product.price}">₹0</span>
        <span th:if="${product.originalPrice != null}"
              style="font-size:16px;text-decoration:line-through;color:#aaa;"
              th:text="'₹' + ${product.originalPrice}">₹0</span>
        <span style="font-size:14px;color:#888;" th:text="${product.unit}">kg</span>
      </div>

      <!-- Stars -->
      <div style="display:flex;gap:4px;margin-bottom:16px;">
        <th:block th:if="${product.rating != null}">
          <i th:each="i : ${#numbers.sequence(1,5)}"
             th:class="${i <= product.rating.intValue()} ? 'fas fa-star' : 'far fa-star'"
             style="color:#f4b400;font-size:16px;"></i>
          <span style="color:#888;font-size:14px;" th:text="'(' + ${product.rating} + ')'"></span>
        </th:block>
      </div>

      <p style="color:#555;font-size:14px;line-height:1.7;margin-bottom:20px;"
         th:text="${product.description}">Description</p>

      <div style="display:flex;gap:12px;margin-bottom:16px;">
        <div th:if="${product.isOrganic}"
             style="background:#d8f3dc;color:#2d6a4f;padding:6px 14px;
                    border-radius:20px;font-size:13px;font-weight:600;">
          🌿 Organic
        </div>
        <div th:if="${product.stockQuantity > 0}"
             style="background:#d8f3dc;color:#2d6a4f;padding:6px 14px;
                    border-radius:20px;font-size:13px;font-weight:600;">
          ✅ In Stock
        </div>
        <div th:unless="${product.stockQuantity > 0}"
             style="background:#fdecea;color:#e63946;padding:6px 14px;
                    border-radius:20px;font-size:13px;font-weight:600;">
          ❌ Out of Stock
        </div>
      </div>

      <!-- Add to Cart -->
      <form th:action="@{/cart/add}" method="post" style="display:flex;gap:10px;">
        <input type="hidden" name="productId" th:value="${product.id}"/>
        <input type="number" name="quantity" value="1" min="1"
               style="width:70px;padding:10px;border:1.5px solid #ddd;
                      border-radius:8px;font-size:14px;text-align:center;"/>
        <button type="submit" class="btn-checkout" style="flex:1;">
          <i class="fas fa-shopping-bag"></i> Add to Cart
        </button>
      </form>

    </div>
  </div>

  <!-- Related Products -->
  <div th:if="${!#lists.isEmpty(related)}" style="margin-top:40px;">
    <h3 style="font-size:20px;font-weight:700;color:#1b4332;margin-bottom:20px;">
      Related Products
    </h3>
    <div class="products-grid popular">
      <div class="product-card" th:each="p : ${related}">
        <a th:href="@{/product/{id}(id=${p.id})}" style="text-decoration:none;color:inherit;">
          <div class="product-img-wrapper popular">
            <img alt="product-image" th:src="${p.imageUrl} ?: '/images/placeholder.jpg'" th:alt="${p.name}"/>
          </div>
          <div class="product-info popular">
            <h4 th:text="${p.name}">Product</h4>
            <div class="price">
              <span class="current" th:text="'₹' + ${p.price}">₹0</span>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>

</div>

<!-- ============footer================ -->
<th:block th:insert="~{fragments/footer :: footer}"></th:block>


<script>

function toggleUserMenu(e) {
  e.stopPropagation();
  document.getElementById('userDropdown').classList.toggle('open');
}

// Close on outside click
document.addEventListener('click', function(e) {
  const dropdown = document.getElementById('userDropdown');
  if (dropdown && !e.target.closest('.user-menu')) {
    dropdown.classList.remove('open');
  }
});

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const dropdown = document.getElementById('userDropdown');
    if (dropdown) dropdown.classList.remove('open');
  }
});
</script>
</body>
</html>
