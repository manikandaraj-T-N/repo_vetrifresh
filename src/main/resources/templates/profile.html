<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
  <title>My Profile - VetriFresh</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" th:href="@{/css/home.css}"/>
  <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/profile.css}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
 
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-name">Vetri<span>Fresh</span></div>
      <div class="logo-tag">Pure · Organic · Fresh</div>
    </div>
    <nav>
      <ul>
        <li><a th:href="@{/home}">Home</a></li>
        <li><a th:href="@{/shop}">Shop</a></li>
        <li><a th:href="@{/blog}">Blog</a></li>
        <li><a th:href="@{/about}">About Us</a></li>
        <li><a th:href="@{/contact}">Contact</a></li>
      </ul>
    </nav>
    <div class="header-actions">
      <a th:href="@{/wishlist}" style="text-decoration:none;">
        <button class="icon-btn" title="Wishlist">
          <i class="far fa-heart"></i>
          <span class="cart-badge" th:text="${wishlistCount} ?: '0'">0</span>
        </button>
      </a>
      <a th:href="@{/cart}" style="text-decoration:none;">
        <button class="icon-btn" title="Cart">
          🛒 <span class="cart-badge" th:text="${cartCount} ?: '0'">0</span>
        </button>
      </a>
      <div sec:authorize="isAuthenticated()">
        <span sec:authentication="name">User</span>
        <a th:href="@{/logout}">
          <button class="icon-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
        </a>
      </div>
      <div sec:authorize="!isAuthenticated()">
        <a th:href="@{/login}"><button class="icon-btn" title="Account">👤</button></a>
      </div>
    </div>
  </div>
</header>

<div class="profile-wrapper">

  <!-- Success Message -->
  <div class="success-banner" th:if="${successMessage}">
    ✅ <span th:text="${successMessage}">Profile updated!</span>
  </div>

  <!-- Profile Header -->
  <div class="profile-header">

    <div class="profile-avatar-wrap">
      <!-- Avatar: show image if set, else show initial -->
      <div class="profile-avatar" id="avatarDisplay"
           th:style="${user.profileImage != null and !#strings.isEmpty(user.profileImage)}
                      ? 'background-image: url(' + ${user.profileImage} + '); background-size: cover; background-position: center; font-size: 0;'
                      : ''">
        <span id="avatarInitial"
              th:if="${user.profileImage == null or #strings.isEmpty(user.profileImage)}"
              th:text="${#strings.toUpperCase(#strings.substring(user.name, 0, 1))}">U</span>
      </div>

      <!-- Camera icon to trigger file input -->
      <label for="profileImageInput" class="avatar-edit-btn" title="Change profile picture">
        <i class="fas fa-camera"></i>
      </label>
      <input type="file" id="profileImageInput" accept="image/*" style="display:none;"
             onchange="previewAndUpload(this)"/>
    </div>

    <div>
      <h2 th:text="${user.name}">User Name</h2>
      <p th:text="${user.email}">user@email.com</p>
      <p th:text="'Member since ' + ${#temporals.format(user.createdAt, 'MMM yyyy')}">Member since Jan 2024</p>
    </div>
  </div>

  <!-- Edit Form (hidden by default) -->
  <div id="editSection" style="display:none; margin-bottom: 24px;">
    <form th:action="@{/profile/update}" method="post">
      <div class="profile-grid">

        <div class="profile-card">
          <h3><i class="fas fa-user"></i> Personal Info</h3>
          <div class="profile-field">
            <label>Full Name</label>
            <input type="text" name="name" th:value="${user.name}" required/>
          </div>
          <div class="profile-field">
            <label>Email</label>
            <input type="email" name="email" th:value="${user.email}" required/>
          </div>
          <div class="profile-field">
            <label>Phone</label>
            <input type="text" name="phone" th:value="${user.phone}" placeholder="Enter phone number"/>
          </div>
        </div>

        <div class="profile-card">
          <h3><i class="fas fa-map-marker-alt"></i> Address</h3>
          <div class="profile-field">
            <label>Address</label>
            <input type="text" name="address" th:value="${user.address}" placeholder="Enter address"/>
          </div>
          <div class="profile-field">
            <label>City</label>
            <input type="text" name="city" th:value="${user.city}" placeholder="Enter city"/>
          </div>
          <div class="profile-field">
            <label>Pincode</label>
            <input type="text" name="pincode" th:value="${user.pincode}" placeholder="Enter pincode"/>
          </div>
        </div>

      </div>

      <div class="form-actions">
        <button type="submit" class="save-btn"><i class="fas fa-save"></i> Save Changes</button>
        <button type="button" class="cancel-btn" onclick="toggleEdit(false)">Cancel</button>
      </div>
    </form>
  </div>

  <!-- View Section -->
  <div id="viewSection">
    <div class="profile-grid">

      <div class="profile-card">
        <h3>
          <span><i class="fas fa-user"></i> Personal Info</span>
          <button class="edit-btn" onclick="toggleEdit(true)"><i class="fas fa-edit"></i> Edit</button>
        </h3>
        <div class="profile-field">
          <label>Full Name</label>
          <p th:text="${user.name}">-</p>
        </div>
        <div class="profile-field">
          <label>Email</label>
          <p th:text="${user.email}">-</p>
        </div>
        <div class="profile-field">
          <label>Phone</label>
          <p th:text="${user.phone} ?: 'Not provided'">-</p>
        </div>
      </div>

      <div class="profile-card">
        <h3><i class="fas fa-map-marker-alt"></i> Address</h3>
        <div class="profile-field">
          <label>Address</label>
          <p th:text="${user.address} ?: 'Not provided'">-</p>
        </div>
        <div class="profile-field">
          <label>City</label>
          <p th:text="${user.city} ?: 'Not provided'">-</p>
        </div>
        <div class="profile-field">
          <label>Pincode</label>
          <p th:text="${user.pincode} ?: 'Not provided'">-</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Quick Links -->
  <div class="profile-card" style="margin-top: 24px;">
    <h3><i class="fas fa-th-large"></i> Quick Links</h3>
    <div class="quick-links">
      <a th:href="@{/orders}" class="quick-link">
        <div class="icon">📦</div>
        <p>My Orders</p>
      </a>
      <a th:href="@{/wishlist}" class="quick-link">
        <div class="icon">❤️</div>
        <p>Wishlist</p>
      </a>
      <a th:href="@{/cart}" class="quick-link">
        <div class="icon">🛒</div>
        <p>My Cart</p>
      </a>
    </div>
  </div>

</div>

<th:block th:insert="~{fragments/footer :: footer}"></th:block>

<script>
  // Toggle between view and edit mode
  function toggleEdit(show) {
    document.getElementById('editSection').style.display = show ? 'block' : 'none';
    document.getElementById('viewSection').style.display = show ? 'none' : 'block';
  }

  // Preview image instantly + upload to server
  function previewAndUpload(input) {
    if (!input.files || !input.files[0]) return;

    const file = input.files[0];

    // Instant preview
    const reader = new FileReader();
    reader.onload = function(e) {
      const avatar = document.getElementById('avatarDisplay');
      avatar.style.backgroundImage = 'url(' + e.target.result + ')';
      avatar.style.backgroundSize = 'cover';
      avatar.style.backgroundPosition = 'center';
      avatar.style.fontSize = '0';
      const initial = document.getElementById('avatarInitial');
      if (initial) initial.style.display = 'none';
    };
    reader.readAsDataURL(file);

    // Upload to server
    const formData = new FormData();
    formData.append('file', file);

    fetch('/profile/upload-image', {
      method: 'POST',
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        showToast('✅ Profile picture updated!', '#1b4332');
      } else {
        showToast('❌ Upload failed. Try again.', '#e74c3c');
      }
    })
    .catch(() => showToast('❌ Upload failed. Try again.', '#e74c3c'));
  }

  // Toast notification
  function showToast(msg, bgColor) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    toast.style.background = bgColor || '#1b4332';
    document.body.appendChild(toast);

    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }
</script>
</body>
</html>
